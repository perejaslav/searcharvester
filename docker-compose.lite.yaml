services:
  redis:
    container_name: searcharvester-lite-redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    networks:
      - searxng
    volumes:
      - valkey-lite-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  searxng:
    container_name: searcharvester-lite-searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    networks:
      - searxng
    ports:
      - "127.0.0.1:8999:8080"
    volumes:
      - ./config.yaml:/etc/searxng/settings.yml:ro
      - searxng-lite-data:/var/cache/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8999/
      - BIND_ADDRESS=[::]:8080
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  tavily-adapter:
    build:
      context: ./simple_tavily_adapter
      dockerfile: Dockerfile.lite
    container_name: searcharvester-lite-adapter
    restart: unless-stopped
    networks:
      - searxng
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config.yaml:/srv/searxng-docker/config.yaml:ro
    environment:
      - RESEARCH_DISABLED=1
      - ADAPTER_MODE=lite
    depends_on:
      - searxng
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

networks:
  searxng:

volumes:
  valkey-lite-data:
  searxng-lite-data:
